# Firebase SQL Connect service configuration.
# Replace serviceId, location, database, and instanceId with the values created in Firebase Console.
serviceId: visible-thinking
location: asia-northeast3
schema:
  source: ./schema
  datasource:
    postgresql:
      database: visible-thinking
      cloudSql:
        instanceId: visible-thinking-sql
        schemaValidation: COMPATIBLE
connectorDirs:
  - ./teacher

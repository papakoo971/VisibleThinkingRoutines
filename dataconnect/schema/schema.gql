enum ActivityMode {
  INDIVIDUAL
  GROUP
}

enum ActivityStatus {
  ACTIVE
  CLOSED
}

enum AttendanceStatus {
  PRESENT
  ABSENT
}

enum SubmissionStatus {
  DRAFT
  SUBMITTED
  MODIFIED
}

enum RoutineColumn {
  SEE
  THINK
  WONDER
}

enum TeacherOperationMode {
  CLASS_FIRST
  SUBJECT_FIRST
}

type TeacherProfile @table(name: "teacher_profile", key: "id") {
  id: String! @col(dataType: "varchar(128)")
  email: String! @col(dataType: "varchar(320)")
  displayName: String! @col(dataType: "varchar(80)")
  operationMode: TeacherOperationMode!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type TeacherAiCredential @table(name: "teacher_ai_credential", key: "id") {
  id: String! @col(dataType: "varchar(128)")
  provider: String! @col(dataType: "varchar(20)")
  encryptedApiKey: String!
  initializationVector: String! @col(dataType: "varchar(32)")
  authenticationTag: String! @col(dataType: "varchar(32)")
  keyHint: String! @col(dataType: "varchar(12)")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type SchoolClass @table(name: "school_class", key: "id") {
  id: String! @col(dataType: "varchar(192)")
  teacherId: String @col(dataType: "varchar(128)")
  name: String! @col(dataType: "varchar(80)")
}

type Student @table(name: "student", key: "id") {
  id: String! @col(dataType: "varchar(192)")
  teacherId: String @col(dataType: "varchar(128)")
  authUid: String @unique @col(dataType: "varchar(128)")
  externalId: String @col(dataType: "varchar(64)")
  schoolClass: SchoolClass!
  studentNumber: String! @col(dataType: "varchar(32)")
  name: String! @col(dataType: "varchar(80)")
  passwordIssued: Boolean! @default(value: false)
}

type Activity @table(name: "activity", key: "id") {
  id: String! @col(dataType: "varchar(96)")
  teacherId: String! @col(dataType: "varchar(128)")
  title: String!
  routine: String! @col(dataType: "varchar(80)")
  activityMode: ActivityMode!
  subject: String! @col(dataType: "varchar(80)")
  status: ActivityStatus!
  code: String! @col(dataType: "varchar(32)")
  materialType: String! @col(dataType: "varchar(40)")
  materialUrl: String
  materialName: String @col(dataType: "varchar(255)")
  instructions: String
  activityDate: Date!
  submittedCount: Int! @default(value: 0)
  targetCount: Int! @default(value: 0)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type ActivityClass @table(name: "activity_class", key: ["activity", "schoolClass"]) {
  activity: Activity!
  schoolClass: SchoolClass!
}

type ActivityAttendance @table(name: "activity_attendance", key: ["activity", "student"]) {
  activity: Activity!
  student: Student!
  status: AttendanceStatus!
}

type ActivityGroup @table(name: "activity_group", key: "id") {
  id: String! @col(dataType: "varchar(128)")
  activity: Activity!
  name: String! @col(dataType: "varchar(80)")
}

type ActivityGroupMember @table(name: "activity_group_member", key: ["activityGroup", "student"]) {
  activityGroup: ActivityGroup!
  student: Student!
}

type IndividualSubmission @table(name: "individual_submission", key: ["activity", "student"]) {
  activity: Activity!
  student: Student!
  status: SubmissionStatus!
  updatedAt: Timestamp! @default(expr: "request.time")
}

type GroupSubmission @table(name: "group_submission", key: ["activity", "activityGroup"]) {
  activity: Activity!
  activityGroup: ActivityGroup!
  status: SubmissionStatus!
  updatedAt: Timestamp! @default(expr: "request.time")
}

type ThinkingCard @table(name: "thinking_card", key: "id") {
  id: String! @col(dataType: "varchar(128)")
  activity: Activity!
  student: Student!
  column: RoutineColumn!
  content: String!
  tags: [String]
  tagsPublic: Boolean! @default(value: false)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type GroupThinkingCard @table(name: "group_thinking_card", key: "id") {
  id: String! @col(dataType: "varchar(128)")
  activity: Activity!
  activityGroup: ActivityGroup!
  updatedByStudent: Student!
  column: RoutineColumn!
  content: String!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type GroupSubmissionAgreement @table(name: "group_submission_agreement", key: ["activity", "activityGroup", "student"]) {
  activity: Activity!
  activityGroup: ActivityGroup!
  student: Student!
  agreed: Boolean! @default(value: false)
  updatedAt: Timestamp! @default(expr: "request.time")
}

type AiAnalysis @table(name: "ai_analysis", key: "id") {
  id: String! @col(dataType: "varchar(160)")
  activity: Activity!
  scope: String! @col(dataType: "varchar(20)")
  studentExternalId: String @col(dataType: "varchar(64)")
  status: String! @col(dataType: "varchar(20)")
  model: String! @col(dataType: "varchar(120)")
  summary: String
  strengths: [String]
  misconceptions: [String]
  nextQuestions: [String]
  recommendations: [String]
  sourceFingerprint: String @col(dataType: "varchar(64)")
  inputTokens: Int
  outputTokens: Int
  totalTokens: Int
  errorMessage: String
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

mutation CreateActivity(
  $id: String!
  $title: String!
  $routine: String!
  $activityMode: ActivityMode!
  $subject: String!
  $status: ActivityStatus!
  $code: String!
  $materialType: String!
  $materialUrl: String
  $materialName: String
  $instructions: String
  $activityDate: Date!
  $submittedCount: Int!
  $targetCount: Int!
) @auth(level: USER) {
  activity_insert(data: {
    id: $id
    teacherId_expr: "auth.uid"
    title: $title
    routine: $routine
    activityMode: $activityMode
    subject: $subject
    status: $status
    code: $code
    materialType: $materialType
    materialUrl: $materialUrl
    materialName: $materialName
    instructions: $instructions
    activityDate: $activityDate
    submittedCount: $submittedCount
    targetCount: $targetCount
    updatedAt_expr: "request.time"
  })
}

mutation DeleteActivity($id: String!) @auth(level: USER) @transaction {
  query @redact {
    activity(key: { id: $id }) {
      teacherId @check(expr: "this == auth.uid", message: "Only the activity owner can delete this activity.")
    }
  }
  activity_delete(key: { id: $id })
}


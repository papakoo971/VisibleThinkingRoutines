query ListActivities @auth(level: USER) {
  activities(where: { teacherId: { eq_expr: "auth.uid" } }) {
    id
    title
    routine
    activityMode
    subject
    status
    code
    materialType
    materialUrl
    materialName
    instructions
    activityDate
    submittedCount
    targetCount
    activityClasses_on_activity {
      schoolClass {
        id
        name
      }
    }
  }
}

query GetTeacherActivity($id: String!) @auth(level: USER) {
  activities(where: { id: { eq: $id }, teacherId: { eq_expr: "auth.uid" } }, limit: 1) {
    id
    title
    routine
    activityMode
    subject
    status
    code
    materialType
    materialUrl
    materialName
    instructions
    activityDate
    submittedCount
    targetCount
    activityClasses_on_activity {
      schoolClass {
        id
        name
      }
    }
    activityAttendances_on_activity {
      status
      student {
        id
        externalId
        name
        studentNumber
        schoolClass {
          id
          name
        }
      }
    }
    activityGroups_on_activity {
      id
      name
      activityGroupMembers_on_activityGroup {
        student {
          id
          externalId
          name
          studentNumber
        }
      }
    }
    individualSubmissions_on_activity {
      status
      student {
        id
        externalId
      }
    }
    groupSubmissions_on_activity {
      status
      activityGroup {
        id
      }
    }
    groupSubmissionAgreements_on_activity {
      agreed
      activityGroup {
        id
      }
      student {
        id
        externalId
      }
    }
    aiAnalyses_on_activity {
      id
      scope
      studentExternalId
      studentVisible
      status
      model
      summary
      strengths
      misconceptions
      nextQuestions
      recommendations
      sourceFingerprint
      inputTokens
      outputTokens
      totalTokens
      errorMessage
      updatedAt
    }
  }
}

mutation UpsertAiAnalysis(
  $id: String!
  $activityId: String!
  $scope: String!
  $studentExternalId: String
  $studentAuthUid: String
  $status: String!
  $model: String!
  $summary: String
  $strengths: [String!]
  $misconceptions: [String!]
  $nextQuestions: [String!]
  $recommendations: [String!]
  $sourceFingerprint: String
  $inputTokens: Int
  $outputTokens: Int
  $totalTokens: Int
  $errorMessage: String
) @auth(level: USER) @transaction {
  query @redact {
    activity(key: { id: $activityId }) {
      teacherId @check(expr: "this == auth.uid")
    }
  }
  aiAnalysis_upsert(data: {
    id: $id
    activity: { id: $activityId }
    scope: $scope
    studentExternalId: $studentExternalId
    studentAuthUid: $studentAuthUid
    status: $status
    model: $model
    summary: $summary
    strengths: $strengths
    misconceptions: $misconceptions
    nextQuestions: $nextQuestions
    recommendations: $recommendations
    sourceFingerprint: $sourceFingerprint
    inputTokens: $inputTokens
    outputTokens: $outputTokens
    totalTokens: $totalTokens
    errorMessage: $errorMessage
    updatedAt_expr: "request.time"
  })
}

query GetTeacherActivityResults($id: String!) @auth(level: USER) {
  activities(where: { id: { eq: $id }, teacherId: { eq_expr: "auth.uid" } }, limit: 1) {
    id
    title
    routine
    activityMode
    subject
    status
    thinkingCards_on_activity {
      id
      column
      content
      tags
      tagsPublic
      updatedAt
      student {
        id
        externalId
        authUid
        name
        studentNumber
        schoolClass { name }
      }
    }
    individualSubmissions_on_activity {
      status
      updatedAt
      student {
        id
        externalId
        name
        studentNumber
        schoolClass { name }
      }
    }
    activityAttendances_on_activity {
      status
      student {
        id
        externalId
        name
        studentNumber
        schoolClass { name }
      }
    }
    aiAnalyses_on_activity {
      id
      scope
      studentExternalId
      studentVisible
      status
      model
      summary
      strengths
      misconceptions
      nextQuestions
      recommendations
      sourceFingerprint
      inputTokens
      outputTokens
      totalTokens
      errorMessage
      updatedAt
    }
  }
}

mutation SetActivityStatus($id: String!, $status: ActivityStatus!) @auth(level: USER) @transaction {
  query @redact {
    activity(key: { id: $id }) {
      teacherId @check(expr: "this == auth.uid")
    }
  }
  activity_update(key: { id: $id }, data: {
    status: $status
    updatedAt_expr: "request.time"
  })
}

mutation UpdateThinkingCardTags($id: String!, $tags: [String!], $tagsPublic: Boolean!) @auth(level: USER) @transaction {
  query @redact {
    thinkingCard(key: { id: $id }) {
      activity {
        teacherId @check(expr: "this == auth.uid")
      }
    }
  }
  thinkingCard_update(key: { id: $id }, data: {
    tags: $tags
    tagsPublic: $tagsPublic
    updatedAt_expr: "request.time"
  })
}

mutation SetAiAnalysisVisibility($id: String!, $studentVisible: Boolean!) @auth(level: USER) @transaction {
  query @redact {
    aiAnalysis(key: { id: $id }) {
      scope @check(expr: "this == 'student'")
      activity {
        teacherId @check(expr: "this == auth.uid")
      }
    }
  }
  aiAnalysis_update(key: { id: $id }, data: {
    studentVisible: $studentVisible
    updatedAt_expr: "request.time"
  })
}

mutation LinkStudentAuth($studentId: String!, $authUid: String!) @auth(level: USER) @transaction {
  query @redact {
    student(key: { id: $studentId }) {
      teacherId @check(expr: "this == auth.uid")
    }
  }
  student_update(key: { id: $studentId }, data: {
    authUid: $authUid
    passwordIssued: true
  })
}

mutation UnlinkStudentAuth($studentId: String!) @auth(level: USER) @transaction {
  query @redact {
    student(key: { id: $studentId }) {
      teacherId @check(expr: "this == auth.uid")
    }
  }
  student_update(key: { id: $studentId }, data: {
    authUid: null
    passwordIssued: false
  })
}

mutation UpsertSchoolClass($name: String!) @auth(level: USER) {
  schoolClass_upsert(data: {
    id_expr: "auth.uid + ':' + vars.name"
    teacherId_expr: "auth.uid"
    name: $name
  })
}

query GetClassManagement @auth(level: USER) {
  schoolClasses(where: { teacherId: { eq_expr: "auth.uid" } }) {
    id
    name
  }
  students(where: { teacherId: { eq_expr: "auth.uid" } }) {
    id
    externalId
    authUid
    studentNumber
    name
    passwordIssued
    schoolClass { id name }
  }
  defaultGroups(where: { teacherId: { eq_expr: "auth.uid" } }) {
    id
    name
    schoolClass { id }
    defaultGroupMembers_on_defaultGroup {
      student { id }
    }
  }
}

mutation RenameSchoolClass($id: String!, $name: String!) @auth(level: USER) @transaction {
  query @redact {
    schoolClass(key: { id: $id }) { teacherId @check(expr: "this == auth.uid") }
  }
  schoolClass_update(key: { id: $id }, data: { name: $name })
}

mutation CreateDefaultGroup($id: String!, $schoolClassId: String!, $name: String!) @auth(level: USER) @transaction {
  query @redact {
    schoolClass(key: { id: $schoolClassId }) { teacherId @check(expr: "this == auth.uid") }
  }
  defaultGroup_insert(data: {
    id: $id
    teacherId_expr: "auth.uid"
    schoolClass: { id: $schoolClassId }
    name: $name
    updatedAt_expr: "request.time"
  })
}

mutation RenameDefaultGroup($id: String!, $name: String!) @auth(level: USER) @transaction {
  query @redact {
    defaultGroup(key: { id: $id }) { teacherId @check(expr: "this == auth.uid") }
  }
  defaultGroup_update(key: { id: $id }, data: { name: $name, updatedAt_expr: "request.time" })
}

mutation DeleteDefaultGroup($id: String!) @auth(level: USER) @transaction {
  query @redact {
    defaultGroup(key: { id: $id }) { teacherId @check(expr: "this == auth.uid") }
  }
  defaultGroup_delete(key: { id: $id })
}

mutation AssignDefaultGroupMember($defaultGroupId: String!, $studentId: String!, $schoolClassId: String!) @auth(level: USER) @transaction {
  query @redact {
    defaultGroup(key: { id: $defaultGroupId }) {
      teacherId @check(expr: "this == auth.uid")
      schoolClass { id @check(expr: "this == vars.schoolClassId") }
    }
    student(key: { id: $studentId }) {
      teacherId @check(expr: "this == auth.uid")
      schoolClass { id @check(expr: "this == vars.schoolClassId") }
    }
  }
  defaultGroupMember_upsert(data: {
    defaultGroup: { id: $defaultGroupId }
    student: { id: $studentId }
  })
}

mutation RemoveDefaultGroupMember($defaultGroupId: String!, $studentId: String!) @auth(level: USER) @transaction {
  query @redact {
    defaultGroup(key: { id: $defaultGroupId }) { teacherId @check(expr: "this == auth.uid") }
    defaultGroupMember(key: { defaultGroupId: $defaultGroupId, studentId: $studentId }) {
      student { teacherId @check(expr: "this == auth.uid") }
    }
  }
  defaultGroupMember_delete(key: { defaultGroupId: $defaultGroupId, studentId: $studentId })
}

mutation UpsertStudent($externalId: String!, $schoolClassId: String!, $studentNumber: String!, $name: String!, $passwordIssued: Boolean!) @auth(level: USER) @transaction {
  query @redact {
    schoolClass(key: { id: $schoolClassId }) {
      teacherId @check(expr: "this == auth.uid")
    }
  }
  student_upsert(data: {
    id_expr: "auth.uid + ':' + vars.externalId"
    teacherId_expr: "auth.uid"
    externalId: $externalId
    schoolClass: { id: $schoolClassId }
    studentNumber: $studentNumber
    name: $name
    passwordIssued: $passwordIssued
  })
}

query ListMyStudents @auth(level: USER) {

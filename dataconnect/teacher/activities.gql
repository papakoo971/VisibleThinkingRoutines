mutation UpsertActivityGroupMember($activityGroupId: String!, $studentId: String!) @auth(level: USER) @transaction {
  query @redact {
    activityGroup(key: { id: $activityGroupId }) {
      activity {
        teacherId @check(expr: "this == auth.uid")
      }
    }
  }
  activityGroupMember_upsert(data: {
    activityGroup: { id: $activityGroupId }
    student: { id: $studentId }
  })
}


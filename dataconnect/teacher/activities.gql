query GetMyTeacherProfile @auth(level: USER) {
  teacherProfile(key: { id_expr: "auth.uid" }) {
    id
    email
    displayName
    operationMode
  }
}

mutation UpsertMyTeacherProfile(
  $email: String!
  $displayName: String!
  $operationMode: TeacherOperationMode!
) @auth(level: USER) {
  teacherProfile_upsert(data: {
    id_expr: "auth.uid"
    email: $email
    displayName: $displayName
    operationMode: $operationMode
    updatedAt_expr: "request.time"
  })
}

mutation DeleteMyTeacherProfile @auth(level: USER) {
  teacherProfile_delete(key: { id_expr: "auth.uid" })
}


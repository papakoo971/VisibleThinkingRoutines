query GetMyTeacherProfile @auth(level: USER) {
  teacherProfile(key: { id_expr: "auth.uid" }) {
    id
    email
    displayName
    operationMode
  }
}

mutation UpsertMyTeacherProfile(
  $email: String!
  $displayName: String!
  $operationMode: TeacherOperationMode!
) @auth(level: USER) {
  teacherProfile_upsert(data: {
    id_expr: "auth.uid"
    email: $email
    displayName: $displayName
    operationMode: $operationMode
    updatedAt_expr: "request.time"
  })
}

mutation DeleteMyTeacherProfile @auth(level: USER) {
  teacherProfile_delete(key: { id_expr: "auth.uid" })
}

query ListActivities @auth(level: USER) {
  activities(where: { teacherId: { eq_expr: "auth.uid" } }) {
    id
    title
    routine
    activityMode
    subject
    status
    code
    materialType
    activityDate
    submittedCount
    targetCount
    activityClasses_on_activity {
      schoolClass {
        id
        name
      }
    }
  }
}

query GetActivity($id: String!) @auth(level: PUBLIC, insecureReason: "Prototype activity detail before Firebase Auth is connected.") {
  activity(id: $id) {
    id
    title
    routine
    activityMode
    subject
    status
    code
    materialType
    activityDate
    submittedCount
    targetCount
    activityClasses_on_activity {
      schoolClass {
        id
        name
      }
    }
    activityAttendances_on_activity {
      status
      student {
        id
        name
        studentNumber
        schoolClass {
          id
          name
        }
      }
    }
    activityGroups_on_activity {
      id
      name
      activityGroupMembers_on_activityGroup {
        student {
          id
          name
          studentNumber
        }
      }
    }
    individualSubmissions_on_activity {
      status
      student {
        id
      }
    }
    groupSubmissions_on_activity {
      status
      activityGroup {
        id
      }
    }
    groupSubmissionAgreements_on_activity {
      agreed
      activityGroup {
        id
      }
      student {
        id
      }
    }
  }
}

mutation UpsertSchoolClass($id: String!, $name: String!) @auth(level: USER, insecureReason: "Classes remain shared prototype data until class ownership migration.") {
  schoolClass_upsert(data: {
    id: $id
    name: $name
  })
}

mutation UpsertStudent($id: String!, $schoolClassId: String!, $studentNumber: String!, $name: String!, $passwordIssued: Boolean!) @auth(level: USER, insecureReason: "Students remain shared prototype data until class ownership migration.") {
  student_upsert(data: {
    id: $id
    schoolClass: { id: $schoolClassId }
    studentNumber: $studentNumber
    name: $name
    passwordIssued: $passwordIssued
  })
}

mutation CreateActivity(
  $id: String!
  $title: String!
  $routine: String!
  $activityMode: ActivityMode!
  $subject: String!
  $status: ActivityStatus!
  $code: String!
  $materialType: String!
  $activityDate: Date!
  $submittedCount: Int!
  $targetCount: Int!
) @auth(level: USER) {
  activity_insert(data: {
    id: $id
    teacherId_expr: "auth.uid"
    title: $title
    routine: $routine
    activityMode: $activityMode
    subject: $subject
    status: $status
    code: $code
    materialType: $materialType
    activityDate: $activityDate
    submittedCount: $submittedCount
    targetCount: $targetCount
    updatedAt_expr: "request.time"
  })
}

mutation DeleteActivity($id: String!) @auth(level: USER) @transaction {
  query @redact {
    activity(key: { id: $id }) {
      teacherId @check(expr: "this == auth.uid", message: "Only the activity owner can delete this activity.")
    }
  }
  activity_delete(key: { id: $id })
}

mutation UpsertActivityClass($activityId: String!, $schoolClassId: String!) @auth(level: USER) @transaction {
  query @redact {
    activity(key: { id: $activityId }) {
      teacherId @check(expr: "this == auth.uid")
    }
  }
  activityClass_upsert(data: {
    activity: { id: $activityId }
    schoolClass: { id: $schoolClassId }
  })
}


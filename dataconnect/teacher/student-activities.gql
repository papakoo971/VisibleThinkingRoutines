query FindActivityByCode($code: String!) @auth(level: PUBLIC, insecureReason: "Activity codes must resolve to an ID before student authentication and assignment authorization.") {
  activities(where: { code: { eq: $code }, status: { eq: ACTIVE } }, limit: 1) {
    id
  }
}

query GetMyStudent @auth(level: USER) {
  students(where: { authUid: { eq_expr: "auth.uid" } }, limit: 1) {
    id
    externalId
    studentNumber
    name
    schoolClass {
      id
      name
    }
  }
}

query ListMyStudentActivities @auth(level: USER) {
  activityAttendances(where: {
    student: { authUid: { eq_expr: "auth.uid" } }
    status: { eq: PRESENT }
  }) {
    activity {
      id
      title
      routine
      activityMode
      subject
      status
      code
      materialType
      materialUrl
      materialName
      instructions
      activityDate
      submittedCount
      targetCount
      activityClasses_on_activity {
        schoolClass {
          id
          name
        }
      }
    }
  }
}

query GetMyStudentActivity($id: String!) @auth(level: USER) {
  activityAttendances(where: {
    activity: { id: { eq: $id } }
    student: { authUid: { eq_expr: "auth.uid" } }
    status: { eq: PRESENT }
  }, limit: 1) {
    activity {
      id
      title
      routine
      activityMode
      subject
      status
      code
      materialType
      materialUrl
      materialName
      instructions
      activityDate
      submittedCount
      targetCount
      activityClasses_on_activity {
        schoolClass {
          id
          name
        }
      }
      activityAttendances_on_activity {
        status
        student {
          id
          externalId
          name
          studentNumber
          schoolClass {
            id
            name
          }
        }
      }
      activityGroups_on_activity {
        id
        name
        activityGroupMembers_on_activityGroup {
          student {
            id
            externalId
            name
            studentNumber
          }
        }
      }
      individualSubmissions_on_activity {
        status
        student {
          id
          externalId
        }
      }
      groupSubmissions_on_activity {
        status
        activityGroup {
          id
        }
      }
      groupSubmissionAgreements_on_activity {
        agreed
        activityGroup {
          id
        }
        student {
          id
          externalId
        }
      }
    }
  }
}

query GetMyStudentWork($activityId: String!) @auth(level: USER) {
  students(where: { authUid: { eq_expr: "auth.uid" } }, limit: 1) {
    id
    externalId
    name
    schoolClass { name }
  }
  thinkingCards(where: {
    activity: { id: { eq: $activityId } }
    student: { authUid: { eq_expr: "auth.uid" } }
  }) {
    id
    column
    content
    tags
    tagsPublic
    updatedAt
  }
  individualSubmissions(where: {
    activity: { id: { eq: $activityId } }
    student: { authUid: { eq_expr: "auth.uid" } }
  }, limit: 1) {
    status
    updatedAt
  }
  aiAnalyses(where: {
    activity: { id: { eq: $activityId } }
    studentAuthUid: { eq_expr: "auth.uid" }
    studentVisible: { eq: true }
    status: { eq: "complete" }
    scope: { eq: "student" }
  }) {
    id
    model
    summary
    strengths
    nextQuestions
    recommendations
    sourceFingerprint
    updatedAt
  }
}

mutation UpsertMyThinkingCard($externalId: String!, $activityId: String!, $studentId: String!, $column: RoutineColumn!, $content: String!) @auth(level: USER) @transaction {
  query @redact {
    student(key: { id: $studentId }) {
      authUid @check(expr: "this == auth.uid")
    }
    activityAttendance(key: { activityId: $activityId, studentId: $studentId }) {
      status @check(expr: "this == 'PRESENT'")
      activity { status @check(expr: "this == 'ACTIVE'") }
    }
  }
  thinkingCard_upsert(data: {
    id_expr: "auth.uid + ':' + vars.externalId"
    activity: { id: $activityId }
    student: { id: $studentId }
    column: $column
    content: $content
    updatedAt_expr: "request.time"
  })
}

mutation DeleteMyThinkingCard($externalId: String!, $activityId: String!, $studentId: String!) @auth(level: USER) @transaction {
  query @redact {
    student(key: { id: $studentId }) { authUid @check(expr: "this == auth.uid") }
    activityAttendance(key: { activityId: $activityId, studentId: $studentId }) {
      status @check(expr: "this == 'PRESENT'")
      activity { status @check(expr: "this == 'ACTIVE'") }
    }
    thinkingCard(key: { id_expr: "auth.uid + ':' + vars.externalId" }) {
      student { authUid @check(expr: "this == auth.uid") }
    }
  }
  thinkingCard_delete(key: { id_expr: "auth.uid + ':' + vars.externalId" })
}

mutation SetMyIndividualSubmission($activityId: String!, $studentId: String!, $status: SubmissionStatus!) @auth(level: USER) @transaction {
  query @redact {
    student(key: { id: $studentId }) { authUid @check(expr: "this == auth.uid") }
    activityAttendance(key: { activityId: $activityId, studentId: $studentId }) {
      status @check(expr: "this == 'PRESENT'")
      activity { status @check(expr: "this == 'ACTIVE'") }
    }
  }
  individualSubmission_upsert(data: {
    activity: { id: $activityId }
    student: { id: $studentId }
    status: $status
    updatedAt_expr: "request.time"
  })
}
